# Configuration for batch processing multiple images

model:
  dino_hub: "dinov3_vitb16"

image:
  resize_size: 224
  crop_size: 224
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

feature:
  layers: [-1]
  use_cls_token: true
  normalize: true
  patch_features: true

extraction:
  input_path: "input_images/"  # Directory containing multiple images
  output_path: "batch_features"
  batch_size: 16  # Larger batch size for efficiency
  device: "cuda"
  save_format: "npz"

logging:
  level: "INFO"