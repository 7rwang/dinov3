# Configuration for batch processing multiple images

exp:
  name: batch_processing

scene:
  id: default_scene

model:
  dino_hub: "dinov3_vitb16"

image:
  resize_size: 224
  crop_size: 224
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

feature:
  layers: [-1]
  use_cls_token: true
  normalize: true
  patch_features: true

visualization:
  enabled: true
  patch_features: true
  global_features: false
  compare: false
  save_individual: true
  method: "pca"
  output_size: [224, 224]
  save_dir: "${hydra:runtime.output_dir}/visualizations"

extraction:
  input_path: "input_images/"  # Directory containing multiple images
  output_path: "${hydra:runtime.output_dir}/features"
  batch_size: 16  # Larger batch size for efficiency
  device: "cuda"
  save_format: "npz"

logging:
  level: "INFO"

hydra:
  job:
    chdir: false
  run:
    dir: outputs/demo/${exp.name}/${scene.id}/${now:%Y-%m-%d_%H-%M-%S}
