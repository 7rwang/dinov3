# Configuration for large DINOv3 model

exp:
  name: large_model

scene:
  id: default_scene

model:
  dino_hub: "dinov3_vitl16"  # Large model

image:
  resize_size: 224
  crop_size: 224
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

feature:
  layers: [-1, -2, -3]  # Extract from multiple layers
  use_cls_token: true
  normalize: true
  patch_features: true

visualization:
  enabled: true
  patch_features: true
  global_features: false
  compare: false
  save_individual: true
  method: "pca"
  output_size: "input"
  save_dir: "${hydra:runtime.output_dir}/visualizations"

extraction:
  input_path: "demo_image.jpg"
  output_path: "${hydra:runtime.output_dir}/features"
  batch_size: 4  # Smaller batch size for large model
  device: "cuda"
  save_format: "npz"

logging:
  level: "INFO"

hydra:
  job:
    chdir: false
  run:
    dir: outputs/demo/${scene.id}/${exp.name}/${now:%Y-%m-%d_%H-%M-%S}
